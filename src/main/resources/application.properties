spring.application.name=weather-tracker
spring.datasource.url=jdbc:sqlite:weather_history.db
spring.datasource.driver-class-name=org.sqlite.JDBC

open-meteo.weather-url=https://api.open-meteo.com/v1/forecast
open-meteo.geocoding-url=https://geocoding-api.open-meteo.com/v1/search
open-meteo.connect-timeout-ms=5000
open-meteo.read-timeout-ms=10000

nominatim.reverse-url=https://nominatim.openstreetmap.org/reverse
nominatim.user-agent=weather-tracker/1.0 (spring-boot-app)
